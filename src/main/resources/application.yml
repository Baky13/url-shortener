spring:
  application:
    name: lunch-tg-bot
  
  datasource:
    url: jdbc:postgresql://localhost:5432/lunch_bot
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Telegram Bot Configuration
telegram:
  bot:
    token: YOUR_BOT_TOKEN_HERE
    username: YOUR_BOT_USERNAME_HERE
    
# Scheduler Configuration
scheduler:
  poll-time: "0 0 10 * * *"  # Every day at 10:00 AM
  report-time: "0 0 12 * * *"  # Every day at 12:00 PM
  
# Logging
logging:
  level:
    com.example.lunch_tg_bot: DEBUG
    org.telegram: INFO
    org.springframework.scheduling: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

server:
  port: 8080
